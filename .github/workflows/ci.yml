name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  comphoser-unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e .

      - name: Compile check
        run: python -m compileall src/comphoser examples/dreambooth/train_dreambooth_lora_flux2_klein_img2img.py

      - name: Unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests/comphoser -p 'test_*.py'

      - name: Import smoke
        run: python -c "import comphoser; import diffusers"
